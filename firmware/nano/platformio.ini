; PlatformIO Project Configuration
; Stopfmaschine - Arduino Nano Firmware

[env:nano]
platform = atmelavr
board = nanoatmega328
framework = arduino

; Upload-Baudrate: CH340-Clone-Nanos haben oft den ALTEN Bootloader (57600).
; Bei "stk500_getsync() not in sync" zuerst 57600 testen, sonst 115200.
; Betrifft NUR den Flash-Vorgang, nicht die Laufzeit-Serial (bleibt 115200).
upload_speed = 57600

; Serial Monitor (Laufzeit-Kommunikation, unabhängig von Upload-Speed)
monitor_speed = 115200
monitor_filters = default, time

; Build flags
build_flags =
    -D SERIAL_BAUD=115200
    -D FIRMWARE_VERSION=\"0.3.1\"

; Bibliotheken
lib_deps =
    waspinator/AccelStepper@^1.64
    arduino-libraries/Servo@^1.2.1

; Auto-detect Upload-Port (oder festlegen, z.B. /dev/ttyUSB0)
; upload_port = /dev/ttyUSB0
